name: calculator
version: 1.0.0
description: "Performs arithmetic operations on two numbers"

author:
  name: "SkillForge Builtins"

inputs:
  - name: a
    type: float
    description: "First operand"
    required: true
  - name: b
    type: float
    description: "Second operand"
    required: true
  - name: operation
    type: string
    description: "Operation: add, sub, mul, div, pow, mod"
    default: "add"

outputs:
  - name: result
    type: float
    description: "Result of the operation"
  - name: operation
    type: string
    description: "Operation performed"

permissions:
  network: false

execution:
  mode: direct
  entrypoint: skill.py
  function: calculate

tags: ["math", "utility", "builtin"]
categories: ["utility"]
