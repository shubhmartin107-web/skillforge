name: social-approval-review
version: 1.0.0
description: "Reviews social media action plans before account-affecting operations run"

author:
  name: "SkillForge Community"

inputs:
  - name: workflow_summary
    type: string
    description: "Short description of the planned social media workflow"
    required: true
  - name: requested_actions
    type: list
    description: "Action labels such as draft, publish, reply, follow, dm, delete, or media_upload"
    default: []
  - name: has_human_approval
    type: boolean
    description: "Whether a human has explicitly approved state-changing actions"
    default: false

outputs:
  - name: decision
    type: string
    description: "approved, needs_changes, or blocked"
  - name: approval_required
    type: boolean
    description: "Whether the requested actions need explicit human approval"
  - name: actions
    type: list
    description: "Normalized account-affecting actions detected"
  - name: missing_context
    type: list
    description: "Minimum missing details needed before execution"

permissions:
  network: false
  filesystem_read: []
  filesystem_write: []

execution:
  mode: direct
  entrypoint: skill.py
  function: run
  runtime: python3.12

tags: ["social-media", "approval", "openclaw", "tweetclaw"]
categories: ["policy", "safety", "automation"]
