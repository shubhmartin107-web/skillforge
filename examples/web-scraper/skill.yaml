name: web-page-fetcher
version: 1.0.0
description: "Fetches a web page and extracts its text content and links"

author:
  name: "SkillForge Team"

inputs:
  - name: url
    type: string
    description: "The URL to fetch"
    required: true
  - name: extract_links
    type: boolean
    description: "Whether to extract links from the page"
    default: false
  - name: max_chars
    type: integer
    description: "Maximum characters to extract"
    default: 5000

outputs:
  - name: content
    type: string
    description: "Extracted text content"
  - name: links
    type: list
    description: "Extracted links (if requested)"
  - name: status_code
    type: integer
    description: "HTTP status code"

permissions:
  network: true
  filesystem_read: []
  filesystem_write: []

execution:
  mode: direct
  entrypoint: skill.py
  function: fetch_page

tags: ["web", "scraping", "http"]
categories: ["data-ingestion"]
